# boost-auto configuration
# You usually do not need to edit numbers here.
# Prefer these commands:
#   auto mode calm
#   auto mode summer
#   auto mode friendly
#   auto mode active
#   auto mode quiet
#   auto quiet-hours 22:00 08:00
#   auto summer-nights on
#   auto snooze 2h
#   auto today-off

# calm     = asks rarely
# summer   = hot-room mode; cooler behavior and slower Boost suggestions
# friendly = balanced default
# active   = reacts faster when the PC is working hard
# quiet    = no suggestions, only protects the PC if it gets too hot
# off      = auto mode is disabled until you run auto start or auto mode ...
# custom   = use the advanced numbers below
AUTO_MODE=calm

# During quiet hours Auto will not ask questions.
# Set both to 00:00 to disable quiet hours.
QUIET_HOURS_START=22:00
QUIET_HOURS_END=08:00

# Keep this on unless you know what you are doing.
ALLOW_CRITICAL_AUTO=yes

# Optional: when AUTO_MODE=summer and quiet hours are active, Auto may apply
# silent --auto to reduce heat and noise overnight. Manual default is off.
SUMMER_SILENT_NIGHTS=no

# Optional local ambient sources. No internet is used.
# AMBIENT_TEMP_C=29
# AMBIENT_TEMP_FILE=/run/boost-room-temp
AMBIENT_TEMP_C=
AMBIENT_TEMP_FILE=

# Advanced values. They are intentionally plain numbers:
# TEMP_HOT: warm enough to suggest a cooler mode.
# TEMP_CRITICAL: too hot, switch to a cooler mode automatically.
# BOOST_TEMP_LIMIT: do not suggest Boost when CPU temperature is already above this.
# LOAD_HIGH: busy enough to suggest Boost.
# LOAD_IDLE: quiet enough to suggest leaving Boost.
TEMP_CRITICAL=85
TEMP_HOT=78
BOOST_TEMP_LIMIT=78
LOAD_HIGH=75
LOAD_HIGH_DURATION=120
LOAD_IDLE=8
LOAD_IDLE_DURATION=600
PROMPT_COOLDOWN=900
POLL_INTERVAL=5
STATS_INTERVAL=60
