# boost-auto configuration
# Edit these thresholds to match your system

TEMP_CRITICAL=85    # °C: auto-switch to powersave (no prompt)
TEMP_HOT=78         # °C: prompt to switch to powersave (if on boost)
LOAD_HIGH=75        # %:  prompt to switch to boost (after LOAD_HIGH_DURATION seconds)
LOAD_HIGH_DURATION=60
LOAD_IDLE=8         # %:  prompt to switch to powersave (after LOAD_IDLE_DURATION seconds)
LOAD_IDLE_DURATION=300
PROMPT_COOLDOWN=300 # seconds between prompts
POLL_INTERVAL=5     # seconds between measurements
