# boost-auto configuration
# You usually do not need to edit numbers here.
# Prefer these commands:
#   auto mode dynamic
#   auto mode gaming
#   auto mode creator
#   auto mode quiet
#   auto quiet-hours 22:00 08:00
#   auto summer-nights on
#   auto snooze 2h
#   auto today-off

# dynamic  = Balanced default. Adapts intelligently to everyday workloads.
# gaming   = Optimized for gaming sessions. Quick to boost, allows higher temps.
# creator  = For rendering and AI training. Maximizes thermal limits and holds Boost longer.
# quiet    = Prioritizes silence and low temperatures. Perfect for meetings or libraries.
# off      = Auto mode is disabled until you run auto start or auto mode ...
AUTO_MODE=dynamic

# During quiet hours Auto will not ask questions.
# Set both to 00:00 to disable quiet hours.
QUIET_HOURS_START=22:00
QUIET_HOURS_END=08:00

# Keep this on unless you know what you are doing.
ALLOW_CRITICAL_AUTO=yes

# Optional: when AUTO_MODE=summer and quiet hours are active, Auto may apply
# silent --auto to reduce heat and noise overnight. Manual default is off.
SUMMER_SILENT_NIGHTS=no

# Optional local ambient sources. No internet is used.
# AMBIENT_TEMP_C=29
# AMBIENT_TEMP_FILE=/run/boost-room-temp
AMBIENT_TEMP_C=
AMBIENT_TEMP_FILE=

# Advanced values. They are intentionally plain numbers:
# TEMP_HOT: warm enough to suggest a cooler mode.
# TEMP_CRITICAL: too hot, switch to a cooler mode automatically.
# BOOST_TEMP_LIMIT: do not suggest Boost when CPU temperature is already above this.
# LOAD_HIGH: busy enough to suggest Boost.
# LOAD_IDLE: quiet enough to suggest leaving Boost.
TEMP_CRITICAL=85
TEMP_HOT=78
BOOST_TEMP_LIMIT=78
LOAD_HIGH=75
LOAD_HIGH_DURATION=120
LOAD_IDLE=8
LOAD_IDLE_DURATION=600
PROMPT_COOLDOWN=900
POLL_INTERVAL=5
STATS_INTERVAL=60

# ── Battery & AC profile settings ──────────────────────────────────
# Separate profiles for AC vs battery power.
# AC_PROFILE: profile to apply when plugged in (boost|powersave|silent|restore)
# BATTERY_PROFILE: profile to apply when on battery
# BATTERY_LOW_PCT: percentage at which to notify "battery low"
# BATTERY_CRITICAL_PCT: percentage at which to auto-switch to powersave
# BATTERY_LOW_NOTIFY: show desktop notification at low battery (yes|no)
AC_PROFILE=boost
BATTERY_PROFILE=powersave
BATTERY_LOW_PCT=20
BATTERY_CRITICAL_PCT=10
BATTERY_LOW_NOTIFY=yes

# ── Screen lock behaviour ───────────────────────────────────────────
# When the screen locks, auto switch to Eco Mode silently.
# Restores Performance profile on unlock. Set to no to disable.
SCREEN_LOCK_POWERSAVE=yes

# ── Battery charge limit ─────────────────────────────────────────────
# Limit max charge % to protect battery longevity (Apple Silicon only).
# 0 = disabled (charge to 100%). Common value: 80.
BATTERY_CHARGE_LIMIT=0

# ── Slow charge protection ──────────────────────────────────────────
# When AC is connected but net power to battery is below the threshold,
# auto-switch to Eco Mode so the charger can keep up.
# SLOW_CHARGE_THRESHOLD_W: net charging watts below which slow charge triggers
# SLOW_CHARGE_BATTERY_PCT: only trigger when battery is below this %
# SLOW_CHARGE_RECOVERY_PCT: restore AC profile when battery reaches this %
SLOW_CHARGE_THRESHOLD_W=2
SLOW_CHARGE_BATTERY_PCT=25
SLOW_CHARGE_RECOVERY_PCT=35
