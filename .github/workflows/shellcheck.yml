name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
      - name: Auto mode preset tests
        run: tests/auto-mode-presets.sh
      - name: Dashboard status tests
        run: python3 tests/boost-web-status.py
